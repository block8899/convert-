name: Convert GFPGAN to NCNN

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Swap
        run: |
          sudo swapoff /swapfile 2>/dev/null || true
          sudo rm -f /swapfile 2>/dev/null || true
          sudo fallocate -l 16G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Install Dependencies (ordered)
        run: |
          pip install --upgrade pip setuptools wheel

          # ★ B1: numpy TRƯỚC torch
          pip install "numpy==1.26.4"
          python -c "import numpy; print('numpy OK:', numpy.__version__)"

          # ★ B2: torch SAU numpy
          pip install torch==2.1.0+cpu torchvision==0.16.0+cpu --index-url https://download.pytorch.org/whl/cpu
          python -c "import torch; print('torch OK:', torch.__version__)"

          # ★ B3: basicsr + gfpgan (không upgrade numpy)
          pip install --no-deps lmdb pyyaml scipy yapf
          pip install --no-deps basicsr==1.4.2
          pip install --no-deps facexlib
          pip install --no-deps gfpgan

          # ★ B4: pnnx
          pip install pnnx

          # Verify
          python -c "import basicsr; print('basicsr OK')"
          python -c "import gfpgan; print('gfpgan OK')"

      - name: Download GFPGAN Model
        run: |
          wget -q https://github.com/TencentARC/GFPGAN/releases/download/v1.3.4/GFPGANv1.4.pth -O GFPGANv1.4.pth
          ls -la GFPGANv1.4.pth

      - name: Convert to NCNN
        timeout-minutes: 30
        run: python convert_gfpgan.py

      - name: Upload Files
        uses: actions/upload-artifact@v4
        with:
          name: GFPGAN-NCNN
          path: |
            *.param
            *.bin
          retention-days: 30
